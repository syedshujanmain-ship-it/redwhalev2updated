    <style>
      /* Global box-sizing for professional layout */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      /* Disable elastic/bouncy scrolling - lock body, scroll inside app only */
      html, body {
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: auto;
        font-size: 14px;
        overflow: hidden;
        height: 100%;
        width: 100%;
        max-width: 100vw;
      }
      
      #root {
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      
      /* Prevent text overflow and ensure proper wrapping */
      * {
        word-wrap: break-word;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      
      /* Better mobile text rendering */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      /* Compact code blocks - strict no overflow */
      pre, code {
        max-width: 100% !important;
        overflow-x: auto !important;
        font-size: 11px !important;
        word-wrap: break-word !important;
        white-space: pre-wrap !important;
      }
      
      /* Responsive container with flexbox */
      .responsive-container {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        width: 95%;
        max-width: 95%;
        margin: 0 auto;
      }
      
      @media (min-width: 768px) {
        .responsive-container {
          width: 80%;
          max-width: 80%;
        }
      }
      
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
